<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wareneingang / Leergut Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:10px; }
    .box { background:white; padding:15px; max-width:1000px; margin:auto; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
    h2 { text-align:center; }
    h3 { margin-top:25px; }
    label { font-weight:bold; }
    input, select { width:100%; padding:10px; margin:6px 0; font-size:14px; }
    button { width:100%; padding:12px; margin-top:10px; background:black; color:white; border:none; border-radius:8px; }

    table { width:100%; border-collapse:collapse; margin-top:10px; font-size:12px; }
    th, td { border:1px solid #ddd; padding:6px; text-align:center; }
    th { background:#eee; }
  </style>
</head>

<body>

<div class="box">
  <h2>🚛 Wareneingang + Leergut Tool</h2>

  <h3>Lieferant / Anlieferung</h3>

  <label>Nr</label>
  <input type="number" id="nr">

  <label>Anlieferer</label>
  <input id="anlieferer">

  <label>Kennzeichen</label>
  <input id="kennzeichen">

  <label>Fahrer</label>
  <input id="fahrer">

  <label>LKW Typ</label>
  <select id="lkw">
    <option value="TIR">TIR</option>
    <option value="6T">6T</option>
    <option value="8T">8T</option>
    <option value="12T">12T</option>
  </select>

  <button onclick="addDelivery()">➕ Lieferung speichern</button>

  <table>
    <thead>
      <tr>
        <th>Nr</th>
        <th>Anlieferer</th>
        <th>Kennzeichen</th>
        <th>Fahrer</th>
        <th>LKW Typ</th>
      </tr>
    </thead>
    <tbody id="deliveryTable"></tbody>
  </table>


  <h3>Leergut</h3>

  <label>E2</label>
  <input type="number" id="e2">

  <label>H1</label>
  <input type="number" id="h1">

  <label>EPAL</label>
  <input type="number" id="epal">

  <label>Kennzeichen</label>
  <input id="kennzeichen2">

  <label>Spedition</label>
  <input id="spedition">

  <button onclick="addEmpty()">➕ Leergut speichern</button>

  <table>
    <thead>
      <tr>
        <th>E2</th>
        <th>H1</th>
        <th>EPAL</th>
        <th>Kennzeichen</th>
        <th>Spedition</th>
      </tr>
    </thead>
    <tbody id="emptyTable"></tbody>
  </table>

  <button onclick="exportExcel()">📦 Excel Export</button>
</div>

<script>

let deliveries = JSON.parse(localStorage.getItem("deliveries") || "[]");
let empties = JSON.parse(localStorage.getItem("empties") || "[]");

function save(){
  localStorage.setItem("deliveries", JSON.stringify(deliveries));
  localStorage.setItem("empties", JSON.stringify(empties));
  render();
}

function addDelivery(){
  deliveries.push({
    nr: nr.value,
    anlieferer: anlieferer.value,
    kennzeichen: kennzeichen.value,
    fahrer: fahrer.value,
    lkw: lkw.value
  });
  save();
}

function addEmpty(){
  empties.push({
    e2: Number(e2.value || 0),
    h1: Number(h1.value || 0),
    epal: Number(epal.value || 0),
    kennzeichen: kennzeichen2.value,
    spedition: spedition.value
  });
  save();
}

function render(){

  deliveryTable.innerHTML = "";
  deliveries.forEach(d => {
    deliveryTable.innerHTML += `
      <tr>
        <td>${d.nr}</td>
        <td>${d.anlieferer}</td>
        <td>${d.kennzeichen}</td>
        <td>${d.fahrer}</td>
        <td>${d.lkw}</td>
      </tr>`;
  });

  emptyTable.innerHTML = "";
  empties.forEach(e => {
    emptyTable.innerHTML += `
      <tr>
        <td>${e.e2}</td>
        <td>${e.h1}</td>
        <td>${e.epal}</td>
        <td>${e.kennzeichen}</td>
        <td>${e.spedition}</td>
      </tr>`;
  });
}

function exportExcel(){

  let data = [];

  data.push({BEREICH:"LIEFERUNGEN"});
  deliveries.forEach(d => data.push(d));

  data.push({});
  data.push({BEREICH:"LEERGUT"});
  empties.forEach(e => data.push(e));

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Wareneingang.xlsx");
}

render();

</script>

</body>
</html>
